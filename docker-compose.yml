services:
  postgres:
    image: postgres:16-alpine
    container_name: investindo-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: investindo_com_leilao
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d investindo_com_leilao"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: investindo-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/investindo_com_leilao?schema=public
      JWT_SECRET: dev-secret
      PORT: 3333
    ports:
      - "3333:3333"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && npm run start"

  frontend:
    build: ./frontend
    container_name: investindo-frontend
    environment:
      VITE_API_URL: http://localhost:3333
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
